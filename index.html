<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bookworm — A quiet place for readers</title>
    <meta name="description" content="Bookworm is a calm Android reader for EPUB and PDF books. No ads, no accounts, no tracking." />
    <meta property="og:title" content="Bookworm — A quiet place for readers" />
    <meta property="og:description" content="A calm Android reader for EPUB and PDF books. No ads, no accounts, no tracking." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#1c1c1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #1c1c1a;
            --text: #f5f3ee;
            --text-dim: rgba(245, 243, 238, 0.62);
            --text-faint: rgba(245, 243, 238, 0.32);
            --coral: #ff3d5c;
            --coral-hover: #ff5573;
            --rule: rgba(245, 243, 238, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        ::selection { background: var(--coral); color: var(--bg); }

        /* ── Top nav ── */
        nav.top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 40px;
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }
        nav.top .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
        }
        nav.top .brand .mark {
            width: 28px;
            height: 28px;
        }
        nav.top .brand .name {
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 500;
            font-size: 20px;
            letter-spacing: -0.3px;
        }
        nav.top .right {
            display: flex;
            gap: 28px;
        }
        nav.top .right a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.16s;
        }
        nav.top .right a:hover { color: var(--text); }

        /* ── Hero (left-aligned) ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding: 60px 40px 120px 40px;
            text-align: left;
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }

        h1.headline {
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 400;
            font-size: clamp(48px, 8vw, 96px);
            line-height: 1.04;
            letter-spacing: -2px;
            margin-bottom: 32px;
            color: var(--text);
            max-width: 14ch;
        }

        p.lede {
            font-family: 'Inter', sans-serif;
            font-size: clamp(17px, 1.6vw, 20px);
            font-weight: 400;
            color: var(--text-dim);
            line-height: 1.6;
            max-width: 540px;
            margin-bottom: 56px;
        }

        .buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 28px;
            border-radius: 0;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.18s ease;
            border: 1px solid rgba(245, 243, 238, 0.28);
            background: transparent;
            color: var(--text);
            white-space: nowrap;
            letter-spacing: -0.1px;
        }
        .btn:hover {
            background: rgba(245, 243, 238, 0.04);
            border-color: rgba(245, 243, 238, 0.55);
        }
        .btn .gp-icon {
            width: 18px;
            height: 20px;
            flex-shrink: 0;
        }

        /* ── Footer ── */
        footer {
            padding: 36px 40px 44px 40px;
            border-top: 1px solid var(--rule);
            color: var(--text-faint);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
            text-align: left;
        }
        footer p { margin: 4px 0; }
        footer .heart { color: var(--coral); }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            nav.top { padding: 22px 22px; }
            nav.top .right { gap: 18px; }
            main { padding: 40px 22px 80px 22px; }
            h1.headline { letter-spacing: -1.4px; margin-bottom: 24px; }
            p.lede { margin-bottom: 40px; }
            .buttons { flex-direction: column; width: 100%; max-width: 320px; gap: 12px; }
            .btn { width: 100%; justify-content: center; padding: 17px 28px; }
            footer { padding: 30px 22px 36px 22px; }
        }
    </style>
</head>
<body>
    <nav class="top">
        <a class="brand" href="./">
            <img class="mark" src="logo.png" alt="" />
            <span class="name">Bookworm</span>
        </a>
        <div class="right">
            <a href="privacy-policy.html">Privacy</a>
        </div>
    </nav>

    <main>
        <h1 class="headline">A quiet place<br/>for readers.</h1>
        <p class="lede">Just reading is the point.</p>

        <div class="buttons">
            <a class="btn" href="https://play.google.com/store/apps/details?id=com.bookwormapp.reader">
                <!-- Google Play icon — official 4-color play triangle -->
                <svg class="gp-icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.4 19.2 25.4 35.3v441.3c0 16.1 8.6 28.5 21.6 35.3l256.5-256L47 0zm425.2 225.6l-58.9-34.1-65.7 64.5 65.7 64.5 60.1-34.1c18-14.3 18-46.5-1.2-60.8zM104.6 499l280.8-161.2-60.1-60.1L104.6 499z" fill="#fff"/>
                </svg>
                Get it on Google Play
            </a>
        </div>
    </main>

    <footer>
        <p>Made with <span class="heart">♥</span> for readers</p>
    </footer>
</body>
</html>
