<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bookworm — A quiet place for readers</title>
    <meta name="description" content="Bookworm is a calm Android reader for EPUB and PDF books. No ads, no accounts, no tracking." />
    <meta property="og:title" content="Bookworm — A quiet place for readers" />
    <meta property="og:description" content="A calm Android reader for EPUB and PDF books. No ads, no accounts, no tracking." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#1c1c1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #1c1c1a;
            --text: #f5f3ee;
            --text-dim: rgba(245, 243, 238, 0.62);
            --text-faint: rgba(245, 243, 238, 0.32);
            --coral: #ff3d5c;
            --coral-hover: #ff5573;
            --rule: rgba(245, 243, 238, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        ::selection { background: var(--coral); color: var(--bg); }

        /* ── Top nav ── */
        nav.top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 40px;
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }
        nav.top .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
        }
        nav.top .brand .mark {
            width: 28px;
            height: 28px;
        }
        nav.top .brand .name {
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 500;
            font-size: 20px;
            letter-spacing: -0.3px;
        }
        nav.top .right {
            display: flex;
            gap: 28px;
        }
        nav.top .right a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.16s;
        }
        nav.top .right a:hover { color: var(--text); }

        /* ── Hero ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 32px 120px 32px;
            text-align: center;
            max-width: 920px;
            margin: 0 auto;
        }

        .logo-large {
            width: 120px;
            height: 120px;
            margin-bottom: 56px;
            animation: float 7s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-5px); }
        }

        h1.headline {
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 400;
            font-size: clamp(48px, 8vw, 92px);
            line-height: 1.04;
            letter-spacing: -2px;
            margin-bottom: 36px;
            color: var(--text);
        }

        p.lede {
            font-family: 'Inter', sans-serif;
            font-size: clamp(17px, 1.6vw, 20px);
            font-weight: 400;
            color: var(--text-dim);
            line-height: 1.6;
            max-width: 540px;
            margin-bottom: 64px;
        }

        .buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 30px;
            border-radius: 999px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1.5px solid transparent;
            white-space: nowrap;
            letter-spacing: -0.1px;
        }
        .btn-primary {
            background: var(--coral);
            color: #fff;
            box-shadow: 0 10px 32px rgba(255, 61, 92, 0.22);
        }
        .btn-primary:hover {
            background: var(--coral-hover);
            transform: translateY(-2px);
            box-shadow: 0 14px 40px rgba(255, 61, 92, 0.32);
        }
        .btn-secondary {
            background: transparent;
            color: var(--text);
            border-color: rgba(245, 243, 238, 0.18);
        }
        .btn-secondary:hover {
            background: rgba(245, 243, 238, 0.04);
            border-color: rgba(245, 243, 238, 0.32);
            transform: translateY(-2px);
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 36px 32px 44px 32px;
            border-top: 1px solid var(--rule);
            color: var(--text-faint);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
        }
        footer p { margin: 4px 0; }
        footer .heart { color: var(--coral); }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            nav.top { padding: 22px 22px; }
            nav.top .right { gap: 18px; }
            main { padding: 40px 22px 80px 22px; }
            .logo-large { width: 100px; height: 100px; margin-bottom: 40px; }
            h1.headline { letter-spacing: -1.4px; margin-bottom: 28px; }
            p.lede { margin-bottom: 44px; }
            .buttons { flex-direction: column; width: 100%; max-width: 320px; gap: 12px; }
            .btn { width: 100%; justify-content: center; padding: 17px 28px; }
        }
    </style>
</head>
<body>
    <nav class="top">
        <a class="brand" href="/">
            <img class="mark" src="logo.png" alt="" />
            <span class="name">Bookworm</span>
        </a>
        <div class="right">
            <a href="privacy-policy.html">Privacy</a>
        </div>
    </nav>

    <main>
        <img class="logo-large" src="logo.png" alt="Bookworm" />

        <h1 class="headline">A quiet place<br/>for readers.</h1>
        <p class="lede">An EPUB and PDF reader for Android. No ads. No accounts. No tracking. The internet is optional, and reading is the point.</p>

        <div class="buttons">
            <a class="btn btn-primary" href="https://play.google.com/store/apps/details?id=com.bookwormapp.reader">
                <svg width="16" height="18" viewBox="0 0 24 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M1.5 1.2v23.6c0 .5.5.8.9.5l17-11.8c.4-.3.4-.8 0-1.1L2.4.7c-.4-.3-.9 0-.9.5z" fill="#fff"/>
                </svg>
                Get it on Google Play
            </a>
            <a class="btn btn-secondary" href="privacy-policy.html">Privacy Policy</a>
        </div>
    </main>

    <footer>
        <p>Made with <span class="heart">♥</span> for readers</p>
    </footer>
</body>
</html>
